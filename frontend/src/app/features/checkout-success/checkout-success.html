<div class="min-h-screen bg-[#FFFBFB] pt-24 pb-16 sm:pt-32 sm:pb-20">
  <div class="section-container max-w-3xl">
    <div
      class="bg-white border border-mystic-rose/20 rounded-3xl md:rounded-[2.5rem] p-6 sm:p-10 md:p-14 text-center shadow-xl"
    >
      <p
        class="text-mystic-rose tracking-[0.3em] uppercase text-xs font-medium mb-6"
      >
        Płatność Zakończona
      </p>
      <h1 class="serif-display text-3xl sm:text-4xl md:text-5xl text-mystic-cocoa mb-6 leading-tight">
        Dziękujemy za zamówienie
      </h1>
      <p class="text-mystic-cocoa text-lg font-light leading-relaxed mb-10">
        Twoja płatność została potwierdzona. Potwierdzenie i dalsze kroki
        wyślemy na e-mail podany w checkout.
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        @if (shopEnabled) {
        <a routerLink="/sklep" class="btn-primary">Wróć do Sklepu</a>
        <a routerLink="/" class="btn-outline">Przejdź na Stronę Główną</a>
        } @else {
        <a routerLink="/" class="btn-primary">Przejdź na Stronę Główną</a>
        }
      </div>
    </div>
  </div>
</div>
