<section class="section-container !py-28">
  <div class="max-w-xl mx-auto">
    <div class="glass-panel border border-mystic-rose/15 rounded-3xl p-8 md:p-10 shadow-lg">
      <p class="text-xs uppercase tracking-[0.2em] text-mystic-rose/70 mb-4">Strefa Użytkownika</p>
      <h1 class="serif-display text-4xl text-mystic-cocoa mb-3">Zaloguj się do panelu</h1>
      <p class="text-mystic-cocoa/70 mb-10">
        Wróć do swojego rytuału dnia, historii odczytów i ustawień subskrypcji.
      </p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <label class="block">
          <span class="block text-sm text-mystic-cocoa/80 mb-2">E-mail</span>
          <input
            formControlName="identifier"
            type="email"
            autocomplete="email"
            class="w-full rounded-2xl border border-mystic-rose/20 bg-white/80 px-4 py-3 outline-none focus:border-mystic-rose"
            placeholder="twoj@email.pl"
          />
        </label>

        <label class="block">
          <span class="block text-sm text-mystic-cocoa/80 mb-2">Hasło</span>
          <input
            formControlName="password"
            type="password"
            autocomplete="current-password"
            class="w-full rounded-2xl border border-mystic-rose/20 bg-white/80 px-4 py-3 outline-none focus:border-mystic-rose"
            placeholder="••••••••"
          />
        </label>

        @if (error()) {
          <p class="text-sm text-red-600">{{ error() }}</p>
        }

        <button type="submit" class="btn-primary w-full !py-3.5" [disabled]="loading()">
          @if (loading()) {
            Logowanie...
          } @else {
            Zaloguj się
          }
        </button>
      </form>

      <p class="text-sm text-mystic-cocoa/65 mt-8">
        Nie masz konta?
        <a routerLink="/rejestracja" class="text-mystic-rose font-medium hover:underline">Utwórz konto</a>
      </p>
    </div>
  </div>
</section>
