<header
  class="fixed top-0 left-0 w-full z-50 bg-white/70 backdrop-blur-md border-b border-mystic-rose/20 transition-all duration-300"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a
        routerLink="/"
        class="flex min-w-0 items-center gap-2 group"
        data-test="navbar-logo"
      >
        <div
          class="text-3xl text-mystic-gold opacity-80 group-hover:rotate-180 transition-transform duration-700"
        >
          ✦
        </div>
        <span
          class="serif-display text-xl sm:text-2xl tracking-wide text-mystic-cocoa group-hover:text-mystic-rose transition-colors"
          >Star Sign</span
        >
      </a>

      <!-- Desktop Nav -->
      <nav
        class="hidden lg:flex items-center gap-6 xl:gap-8"
        aria-label="Nawigacja główna"
      >
        @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="!text-mystic-rose"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          [attr.data-test]="'navbar-link-' + link.path.replace('/', '')"
          class="text-mystic-cocoa hover:text-mystic-rose font-medium text-sm tracking-widest uppercase transition-colors"
        >
          {{ link.label }}
        </a>
        }
      </nav>

      <!-- Actions -->
      <div class="hidden lg:flex items-center gap-4 xl:gap-6">
        @if (shopEnabled) {
        <button
          (click)="openCart.emit()"
          class="relative text-mystic-cocoa hover:text-mystic-rose transition-colors p-2"
          data-test="navbar-cart-button"
          aria-label="Otwórz koszyk"
        >
          <ng-icon name="heroShoppingBag" class="text-2xl" />
          @if (cartCount() > 0) {
          <span
            class="absolute top-0 right-0 bg-mystic-rose text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-white"
          >
            {{ cartCount() }}
          </span>
          }
        </button>
        }

        <a
          [routerLink]="userTargetPath()"
          class="text-mystic-cocoa hover:text-mystic-rose transition-colors p-2 inline-flex"
          data-test="navbar-profile-link"
          aria-label="Mój profil"
        >
          <ng-icon name="heroUser" class="text-2xl" />
        </a>

        <a
          [routerLink]="membershipTargetPath()"
          class="bg-mystic-rose text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-[#c291a1] transition-all shadow-sm hover:shadow-md"
          data-test="navbar-membership-button"
        >
          {{ membershipLabel() }}
        </a>
      </div>

      <!-- Mobile Actions & Toggle -->
      <div class="lg:hidden flex items-center gap-2">
        @if (shopEnabled) {
        <button
          (click)="openCart.emit()"
          class="relative text-mystic-cocoa p-2"
          aria-label="Otwórz koszyk"
        >
          <ng-icon name="heroShoppingBag" class="text-2xl" />
          @if (cartCount() > 0) {
          <span
            class="absolute top-0 right-0 bg-mystic-rose text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-white"
          >
            {{ cartCount() }}
          </span>
          }
        </button>
        }

        <button
          (click)="toggleMobileMenu()"
          class="text-mystic-cocoa hover:text-mystic-rose focus:outline-none p-2 rounded-lg transition-colors"
          [attr.aria-expanded]="mobileMenuOpen()"
          data-test="navbar-mobile-toggle"
          [attr.aria-label]="mobileMenuOpen() ? 'Zamknij menu' : 'Otwórz menu'"
        >
          @if (mobileMenuOpen()) {
          <ng-icon name="heroXMark" class="text-2xl" />
          } @else {
          <ng-icon name="heroBars3" class="text-2xl" />
          }
        </button>
      </div>
    </div>

    <!-- Mobile Menu Dropdown -->
    @if (mobileMenuOpen()) {
    <nav
      class="lg:hidden max-h-[calc(100vh-5rem)] overflow-y-auto pb-8 border-t border-mystic-rose/10 pt-6 animate-fade-in"
      aria-label="Nawigacja mobilna"
    >
      <div class="flex flex-col gap-2 px-1 sm:px-2">
        @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="!text-mystic-rose border-l-4 border-mystic-rose pl-6"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          (click)="toggleMobileMenu()"
          [attr.data-test]="'navbar-link-' + link.path.replace('/', '')"
          class="text-mystic-cocoa hover:text-mystic-rose font-medium text-lg sm:text-xl serif-display transition-all px-4 py-2"
        >
          {{ link.label }}
        </a>
        }

        <div
          class="mt-5 pt-5 border-t border-mystic-rose/10 flex flex-col gap-4"
        >
          <a
            [routerLink]="userTargetPath()"
            (click)="toggleMobileMenu()"
            class="flex items-center gap-3 px-4 text-mystic-cocoa"
          >
            <ng-icon name="heroUser" class="text-xl" />
            {{ userLinkLabel() }}
          </a>
          <a
            [routerLink]="membershipTargetPath()"
            (click)="toggleMobileMenu()"
            class="btn-primary w-full !py-4 text-center"
          >
            {{ membershipLabel() }} ✦
          </a>
        </div>
      </div>
    </nav>
    }
  </div>
</header>
<!-- Spacer for fixed header -->
<div class="h-20"></div>
